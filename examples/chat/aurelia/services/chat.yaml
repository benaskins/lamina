service:
  name: chat
  type: native
  command: ./bin/chat

network:
  port: 8080

health:
  type: http
  path: /
  interval: 10s
  timeout: 2s

dependencies:
  after: [ollama]
  requires: [ollama]

restart:
  policy: on-failure
  max_attempts: 3
  delay: 5s

env:
  OLLAMA_HOST: "http://127.0.0.1:11434"
